<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Family TV Guide</title>

<style>

body{
    background: linear-gradient(180deg, #1a1a1a, #0f0f0f);
    color:#f5f5f5;
    font-family: "Segoe UI", Arial, sans-serif;
    max-width:900px;
    margin:auto;
    padding:40px;
}

h1{
    color:#ff4d4d;
    text-align:center;
    margin-bottom:25px;
    font-size:2.2rem;
    letter-spacing:1px;
}

table{
    width:100%;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:12px;
    background:#202020;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

th{
    background:#303030;
    color:white;
    text-align:left;
    padding:14px;
    font-size:15px;
}

td{
    padding:14px;
    border-bottom:1px solid #3d3d3d;
}

tr:nth-child(even){
    background:#262626;
}

tr:hover{
    background:#3a3a3a;
    transition:.25s;
}

a{
    color:#6db8ff;
    text-decoration:none;
}

a:hover{
    text-decoration:underline;
}

.badge{
    display:inline-block;
    padding:4px 10px;
    border-radius:20px;
    font-size:.85rem;
    font-weight:bold;
}

.prime{
    background:#00A8E1;
    color:white;
}

.hulu{
    background:#1CE783;
    color:black;
}

.apple{
    background:#555;
    color:white;
}

.watching{
    color:#58d26a;
    font-weight:bold;
}

.finished{
    color:#4da3ff;
    font-weight:bold;
}

.waiting{
    color:#ffb84d;
    font-weight:bold;
}

@media(max-width:700px){

    body{
        padding:20px;
    }

    th, td{
        padding:10px;
        font-size:.9rem;
    }

    h1{
        font-size:1.7rem;
    }

}

</style>

</head>

<body>

<h1>📺 Family TV Guide</h1>

<table>

<tr>
<th>Show</th>
<th>Streaming Service</th>
<th>Status</th>
</tr>

<tr>
<td>The Agency</td>
<td><span class="badge prime">Prime</span></td>
<td><span class="watching">Watching</span></td>
</tr>

<tr>
<td>Ride or Die</td>
<td><span class="badge prime">Prime</span></td>
<td><span class="watching">Watching</span></td>
</tr>

<tr>
<td>High Country</td>
<td><span class="badge hulu">Hulu</span></td>
<td><span class="watching">Watching</span></td>
</tr>

<tr>
<td>Silo</td>
<td><span class="badge apple">Apple TV+</span></td>
<td><span class="watching">Watching</span></td>
</tr>

<tr>
<td>Lucky</td>
<td><span class="badge apple">Apple TV+</span></td>
<td><span class="watching">Watching</span></td>
</tr>
    
<tr>
<td>Legends</td>
<td><span class="badge hulu">Hulu</span></td>
<td><span class="watching">Watching</span></td>
</tr>

</table>

</body>
</html>
